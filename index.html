<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Saima Rate Management</title>
    <style>
        body { font-family: 'Jameel Noori Nastaleeq', Arial; background: #1a1a1a; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: #2c2c2c; padding: 40px; border-radius: 15px; border: 1px solid #333; text-align: center; color: white; width: 320px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { color: #ffd700; font-size: 24px; margin-bottom: 20px; }
        
        /* Input box ko elegant banaya gaya hai */
        input { 
            width: 90%; 
            padding: 12px; 
            margin-bottom: 20px; 
            border-radius: 8px; 
            border: 1px solid #444; 
            background: #1a1a1a; 
            color: #ffd700; 
            font-size: 20px; 
            text-align: center; 
            outline: none;
        }
        
        /* Sirf ek hi button jo dono kaam karega */
        .btn-enter { 
            width: 100%; 
            padding: 12px; 
            border-radius: 8px; 
            border: none; 
            background: #ffd700; 
            color: #000; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 18px; 
            transition: 0.3s;
        }
        
        .btn-enter:hover { background: #ffea00; transform: translateY(-2px); }
        .error { color: #ff4d4d; font-size: 14px; display: none; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>🏭 Rate Management</h2>
        <input type="password" id="passInput" placeholder="پاس ورڈ درج کریں" onkeypress="handleKeyPress(event)">
        <button class="btn-enter" onclick="validateLogin()">لاگ ان کریں</button>
        <p id="errorMsg" class="error">غلط پاس ورڈ! دوبارہ کوشش کریں۔</p>
    </div>

    <script>
        function validateLogin() {
            const pass = document.getElementById('passInput').value;
            const error = document.getElementById('errorMsg');
            
            // Khofiya Passwords
            const adminPass = "786"; // Full Access ke liye
            const viewPass = "123";  // Sirf View/Filter/Print ke liye

            if (pass === adminPass) {
                // Admin mode active hoga
                sessionStorage.setItem('userAuth', 'full');
                window.location.href = 'Rate New.html'; 
            } 
            else if (pass === viewPass) {
                // Viewer mode active hoga
                sessionStorage.setItem('userAuth', 'view');
                window.location.href = 'Rate New.html'; 
            } 
            else {
                // Galat password par error
                error.style.display = 'block';
                document.getElementById('passInput').value = "";
            }
        }

        // Enter dabane par bhi login ho jaye
        function handleKeyPress(e) {
            if (e.key === 'Enter') validateLogin();
        }
    </script>
</body>
</html>
